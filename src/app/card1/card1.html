<form (ngSubmit)="onSubmit(username.value,description.value)" #form>
<app-okos-mezo cimke="Felhasználónév">
<input type="title" id="title" #username>
</app-okos-mezo>
<br>
<app-okos-mezo cimke="Rövid bemutatkozás" >
<textarea name="description" id="description" #description></textarea>
</app-okos-mezo>
<button type="submit">
    Elküldés
</button>
</form>
